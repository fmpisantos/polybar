;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;               POLYBAR CONFIG                   ;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[colors]
background = #232136
foreground = #e0def4
accent = #9ccfd8
disabled = #6e6a86
transparent = #00232136
module-bg = #232136
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[bar/main]
monitor = ${env:MONITOR}
width = 100%
# width = 98%
height = 30
# offset-x = 1%
fixed-center = true
background = ${colors.transparent}
foreground = ${colors.foreground}
font-0 = "MonaspiceNe Nerd Font Mono:style=Regular:size=10"
modules-left = i3
modules-center = datetime
modules-right = xkeyboard network ram battery
module-margin = 1
radius = 6.6-6.6
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;              MODULES                           ;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/i3]
type = internal/i3
format = <label-state>
index-sort = true
wrapping-scroll = false

label-focused = %name%
label-focused-background = ${colors.module-bg}
label-focused-foreground = ${colors.foreground}
label-focused-padding = 2
label-focused-radius = 6.6-6.6 ; <-- ADDED

label-unfocused = %name%
label-unfocused-background = ${colors.module-bg}
label-unfocused-foreground = ${colors.disabled}
label-unfocused-padding = 2
label-unfocused-radius = 6.6-6.6 ; <-- ADDED

label-visible = %name%
label-visible-background = ${colors.module-bg}
label-visible-foreground = ${colors.disabled}
label-visible-padding = 2
label-visible-radius = 6.6-6.6 ; <-- ADDED

label-urgent = %name%
label-urgent-background = ${colors.foreground}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2
label-urgent-radius = 6.6-6.6 ; <-- ADDED

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
format = <label-layout>
format-background = ${colors.module-bg}
format-padding = 1
format-radius = 6.6-6.6 ; <-- ADDED
label-layout = " %layout% "
label-layout-foreground = ${colors.accent}
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/network]
type = internal/network
interface = wlp0s20f3
format-connected = <label-connected>
format-connected-background = ${colors.module-bg}
format-connected-padding = 1
format-radius = 6.6-6.6 ; <-- ADDED (applies to both connected and disconnected)
format-disconnected = <label-disconnected>
format-disconnected-background = ${colors.module-bg}
format-disconnected-padding = 1
label-connected = " %essid% "
label-disconnected = " offline "
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/ram]
type = internal/memory
interval = 2
format = <label>
format-background = ${colors.module-bg}
format-padding = 1
format-radius = 6.6-6.6 ; <-- ADDED
format-prefix = "RAM: "
format-prefix-foreground = ${colors.accent}
label = %gb_used%/%gb_total%
label-foreground = ${colors.accent}
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
format-charging = <label-charging>
format-charging-background = ${colors.module-bg}
format-charging-padding = 1
format-radius = 6.6-6.6 ; <-- ADDED (applies to all battery formats)
format-discharging = <label-discharging>
format-discharging-background = ${colors.module-bg}
format-discharging-padding = 1
format-full = <label-full>
format-full-background = ${colors.module-bg}
format-full-padding = 1
label-charging = " %percentage%%"
label-discharging = " %percentage%%"
label-full = " 100%"
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/datetime]
type = internal/date
interval = 1

date = " %d - %H:%M"
date-alt = " %Y-%m-%d %A %H:%M:%S"

format = <label>
format-background = ${colors.module-bg}
format-padding = 1
format-radius = 6.6-6.6 ; <-- ADDED

label = " %date% "
label-foreground = ${colors.accent}
