;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;               POLYBAR CONFIG                   ;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[colors]
background = #232136
foreground = #e0def4
accent = #9ccfd8
disabled = #6e6a86
transparent = #00232136
module-bg = #232136
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[bar/main]
monitor = ${env:MONITOR}
width = 100%
# width = 98%
height = 27
# offset-x = 1%
fixed-center = true
background = ${colors.transparent}
foreground = ${colors.foreground}
font-0 = "MonaspiceNe Nerd Font Mono:style=Regular:size=11"
font-1 = "MonaspiceNe Nerd Font Mono:style=Regular:size=12"
font-2 = "MonaspiceNe Nerd Font Mono:style=Regular:size=13"
modules-left = i3
modules-center = datetime
modules-right = xkeyboard network bluetooth  volume ram battery settings
module-margin = 0
radius = 6.6-6.6
enable-ipc = true
cursor-click = pointer
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;              MODULES                           ;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/i3]
type = internal/i3
format = <label-state>
index-sort = true
wrapping-scroll = false
label-focused = %name%
label-focused-background = ${colors.accent}
label-focused-foreground = ${colors.background}
label-focused-padding = 2
label-focused-radius = 6.6-6.6
label-unfocused = %name%
label-unfocused-background = ${colors.module-bg}
label-unfocused-foreground = ${colors.disabled}
label-unfocused-padding = 2
label-unfocused-radius = 6.6-6.6
label-visible = %name%
label-visible-background = ${colors.module-bg}
label-visible-foreground = ${colors.disabled}
label-visible-padding = 2
label-visible-radius = 6.6-6.6
label-urgent = %name%
label-urgent-background = ${colors.foreground}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2
label-urgent-radius = 6.6-6.6
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/xkeyboard]
type = custom/ipc
hook-0 = echo "  $(cat /tmp/current_layout 2>/dev/null || echo 'EN(swapped)') "
initial = 1
format-background = ${colors.module-bg}
format-padding = 1
format-margin = 1
format-radius = 6.6-6.6
click-left = ~/.config/i3/toggle-layout.sh
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/network]
type = custom/script
exec = ~/.config/polybar/scripts/network.sh
interval = 5
format-background = ${colors.module-bg}
format-padding = 1
format-margin = 1
format-radius = 6.6-6.6
click-left = nm-connection-editor &
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth.sh
interval = 5
format-background = ${colors.module-bg}
format-padding = 1
format-margin = 1
format-radius = 6.6-6.6
click-left = blueman-manager &
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/ram]
type = internal/memory
interval = 2
format = <label>
format-background = ${colors.module-bg}
format-padding = 1
format-margin = 1
format-radius = 6.6-6.6
format-prefix = "RAM: "
format-foreground = ${colors.foreground}
label = %gb_used%/%gb_total%
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
format-charging = <label-charging>
format-charging-background = ${colors.module-bg}
format-charging-padding = 1
format-radius = 6.6-0.0
format-discharging = <label-discharging>
format-discharging-background = ${colors.module-bg}
format-discharging-padding = 1
format-full = <label-full>
format-full-background = ${colors.module-bg}
format-full-padding = 1
label-charging = " %percentage%%"
label-discharging = " %percentage%%"
label-full = " 100%"
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/datetime]
type = internal/date
interval = 1
date = " %d - %H:%M"
date-alt = " %Y-%m-%d %A %H:%M:%S"
format = <label>
format-background = ${colors.module-bg}
format-foreground = ${colors.accent}
format-radius = 6.6-6.6
label = " %date% "
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/settings]
type = custom/text
content = ""
content-background = ${colors.accent}
content-foreground = ${colors.background}
content-padding = 2
content-radius = 0.0-6.6
click-left = env XDG_CURRENT_DESKTOP=GNOME gnome-control-center &
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; VOLUME MODULE (PipeWire/WirePlumber)
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/volume]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
format-volume-background = ${colors.module-bg}
format-volume-padding = 1
format-volume-margin = 1
format-volume-radius = 6.6-6.6
format-muted = <label-muted>
format-muted-background = ${colors.module-bg}
format-muted-padding = 1
format-muted-margin = 1
format-muted-radius = 6.6-6.6
label-volume = %percentage%%
label-muted =  muted
label-muted-foreground = ${colors.disabled}
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
click-left = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
click-right = pavucontrol &
scroll-up = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
scroll-down = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
